<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>烽燧 FengSui - 高保真产品原型</title>
<style>
:root {
  color-scheme: light;
  --bg: #eef2f4;
  --surface: #ffffff;
  --surface-2: #f7f9fa;
  --line: #d8dee3;
  --line-soft: #e8ecef;
  --text: #263238;
  --muted: #66727c;
  --faint: #8b98a5;
  --accent: #0f8f8c;
  --green: #1f9d72;
  --amber: #b7791f;
  --purple: #6b5fb5;
  --ink: #20262d;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 18px 28px;
  background: rgba(238, 242, 244, .92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}
.brand h1 {
  margin: 0;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: 0;
}
.brand p {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 13px;
}
.summary {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.badge {
  display: inline-flex;
  align-items: center;
  height: 28px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 650;
}
.badge.dark {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.layout {
  display: grid;
  grid-template-columns: 272px minmax(0, 1fr);
  gap: 24px;
  padding: 24px;
}
nav {
  position: sticky;
  top: 96px;
  align-self: start;
  max-height: calc(100vh - 120px);
  overflow: auto;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: 0 12px 32px rgba(31, 41, 51, .08);
}
nav strong {
  display: block;
  margin: 4px 8px 10px;
  font-size: 13px;
}
nav a {
  display: block;
  padding: 9px 10px;
  border-radius: 6px;
  color: #34434f;
  text-decoration: none;
  font-size: 13px;
  line-height: 1.35;
}
nav a:hover,
nav a:focus {
  background: #e3f4f2;
  color: var(--accent);
  outline: none;
}
main {
  min-width: 0;
}
.intro {
  margin-bottom: 24px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}
.screen {
  margin-bottom: 34px;
}
.screen-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 10px;
}
.screen h2 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 0;
}
.screen p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 13px;
}
.tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.tag {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 650;
  white-space: nowrap;
}
.tag.p0 {
  background: #e8f6ef;
  border-color: #bee6d3;
  color: var(--green);
}
.tag.p1 {
  background: #efedfa;
  border-color: #d5cef5;
  color: var(--purple);
}
.tag.overview {
  background: #fff4db;
  border-color: #f3d38a;
  color: var(--amber);
}
.frame {
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  box-shadow: 0 12px 32px rgba(31, 41, 51, .08);
}
.frame img {
  display: block;
  width: 100%;
  height: auto;
}
.links {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.links a {
  color: var(--accent);
  font-size: 13px;
  font-weight: 650;
  text-decoration: none;
}
.links a:hover {
  text-decoration: underline;
}
.fallback {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--muted);
}
@media (max-width: 900px) {
  .topbar { align-items: flex-start; flex-direction: column; }
  .summary { justify-content: flex-start; }
  .layout { grid-template-columns: 1fr; padding: 16px; }
  nav { position: static; max-height: none; }
  .screen-head { align-items: flex-start; flex-direction: column; }
  .tags { justify-content: flex-start; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>烽燧 FengSui - 高保真产品原型</h1>
    <p>基于项目文档与 Qt Widgets 源码整理，覆盖 P0 主链路与 P1 关键屏。</p>
  </div>
  <div class="summary">
    <span class="badge dark">15 张屏幕</span>
    <span class="badge">1280x820</span>
    <span class="badge">SVG + PNG</span>
    <span class="badge">稳重桌面工具</span>
  </div>
</header>
<div class="layout">
  <nav id="screenNav">
    <strong>页面索引</strong>
  </nav>
  <main>
    <section class="intro">
      本原型将原线框图升级为高保真评审稿。画面内保留 P0/P1 与源码状态标签，方便区分首发必做、后续规划、源码已落地和当前仍为占位的范围。安全表达限定为首次授权、记住选择和共享访问控制，不展示 V1.0 未支持的加密承诺。
    </section>
    <div id="screens" class="fallback">正在加载原型清单...</div>
  </main>
</div>
<script>
const fallbackScreens = [
  {"file":"01_onboarding.svg","png":"01_onboarding.png","title":"01 首次启动向导","subtitle":"三步完成昵称、网络发现与默认下载目录设置。","priority":"P0 必做","source":"源码已落地"},
  {"file":"02_main_messages.svg","png":"02_main_messages.png","title":"02 主界面 - 消息与会话","subtitle":"默认入口：左侧导航、会话列表与聊天区域。","priority":"P0 必做","source":"源码已落地"},
  {"file":"03_contacts_manual_ip.svg","png":"03_contacts_manual_ip.png","title":"03 联系人 - 自动发现与手动 IP","subtitle":"展示在线设备、系统类型、连接端点与手动添加兜底路径。","priority":"P0 必做","source":"源码已落地"},
  {"file":"03_chat_file_send.svg","png":"03_chat_file_send.png","title":"04 单聊 - 文件拖拽发送","subtitle":"聊天上下文中发文本、拖文件、处理接收确认与传输状态。","priority":"P0 必做","source":"部分占位"},
  {"file":"04_broadcast_confirm.svg","png":"04_broadcast_confirm.png","title":"05 广播通知 - 确认收到","subtitle":"向全网段发送通知，并查看已确认与未确认列表。","priority":"P1 规划","source":"规划原型"},
  {"file":"05_transfer_center.svg","png":"05_transfer_center.png","title":"06 传输中心","subtitle":"所有发送、接收、共享下载任务的统一视图。","priority":"P0 必做","source":"源码占位"},
  {"file":"06_online_shares.svg","png":"06_online_shares.png","title":"07 共享文件 - 浏览在线共享","subtitle":"选择在线共享源，浏览目录并下载文件。","priority":"P0 必做","source":"源码占位"},
  {"file":"07_my_shares.svg","png":"07_my_shares.png","title":"08 我的共享 - 目录管理","subtitle":"添加、启用、停用或移除本机共享目录。","priority":"P0 必做","source":"源码占位"},
  {"file":"08_permission_modal.svg","png":"08_permission_modal.png","title":"09 授权弹窗 - 首次访问确认","subtitle":"首次访问共享目录时，由共享方明确允许、拒绝或记住选择。","priority":"P0 必做","source":"待实现"},
  {"file":"09_dropbox_list.svg","png":"09_dropbox_list.png","title":"10 文件投递箱 - 任务列表","subtitle":"P1 资料收集入口：任务、截止时间、提交统计。","priority":"P1 规划","source":"源码占位"},
  {"file":"10_create_dropbox.svg","png":"10_create_dropbox.png","title":"11 新建投递任务","subtitle":"创建文件收集任务并设置说明、截止时间与可见范围。","priority":"P1 规划","source":"源码占位"},
  {"file":"11_settings_network.svg","png":"11_settings_network.png","title":"12 设置 - 网络发现","subtitle":"常规设置、发现开关、监听端口与手动连接入口。","priority":"P0 必做","source":"源码占位"},
  {"file":"12_network_diagnostics.svg","png":"12_network_diagnostics.png","title":"13 网络诊断","subtitle":"自动检测本机网络、监听端口和广播连通性。","priority":"P0 必做","source":"源码占位"},
  {"file":"13_tray_menu.svg","png":"13_tray_menu.png","title":"14 系统托盘菜单","subtitle":"关闭主窗口后的托盘入口、在线状态切换与退出流程。","priority":"P1 规划","source":"源码存在"},
  {"file":"14_information_architecture.svg","png":"14_information_architecture.png","title":"15 信息架构与流程总览","subtitle":"用于评审 P0/P1 页面关系、核心链路和版本边界。","priority":"总览","source":"设计说明"}
];

function priorityClass(priority) {
  if (priority.includes('P1')) return 'p1';
  if (priority.includes('总览')) return 'overview';
  return 'p0';
}

function render(screens) {
  const nav = document.getElementById('screenNav');
  const host = document.getElementById('screens');
  nav.innerHTML = '<strong>页面索引</strong>' + screens.map((screen, index) => {
    const id = `s${String(index + 1).padStart(2, '0')}`;
    return `<a href="#${id}">${screen.title}</a>`;
  }).join('');
  host.className = '';
  host.innerHTML = screens.map((screen, index) => {
    const id = `s${String(index + 1).padStart(2, '0')}`;
    return `
      <section class="screen" id="${id}">
        <div class="screen-head">
          <div>
            <h2>${screen.title}</h2>
            <p>${screen.subtitle}</p>
          </div>
          <div class="tags">
            <span class="tag ${priorityClass(screen.priority)}">${screen.priority}</span>
            <span class="tag">${screen.source}</span>
          </div>
        </div>
        <div class="frame">
          <img src="screens/${screen.file}" alt="${screen.title}">
        </div>
        <div class="links">
          <a href="screens/${screen.file}" target="_blank" rel="noreferrer">打开 SVG</a>
          <a href="screens/${screen.png}" target="_blank" rel="noreferrer">打开 PNG</a>
        </div>
      </section>
    `;
  }).join('');
}

fetch('screens/manifest.json')
  .then((res) => res.ok ? res.json() : fallbackScreens)
  .then(render)
  .catch(() => render(fallbackScreens));
</script>
</body>
</html>
